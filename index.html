<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">   

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
}

/* КОНТЕЙНЕР */
.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-bottom: 220px;
}

/* INPUT */
input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;

    position: sticky;
    top: 0;
    z-index: 10;
}

/* RESULT */
.result {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

/* KEYBOARD */
.keyboard {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;

    width: 100%;
    max-width: 420px;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    padding: 14px;

    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);

    border-top: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 -8px 20px rgba(0,0,0,0.06);

    border-top-left-radius: 18px;
    border-top-right-radius: 18px;

    transition: transform 0.25s ease, opacity 0.25s ease;
}

.keyboard.hide {
    transform: translateX(-50%) translateY(120%);
    opacity: 0;
}

/* BUTTON */
.button-23 {
  background-color: #FFFFFF;
  border: 1px solid #222222;
  border-radius: 8px;
  color: #222;
  font-size: 16px;
  font-weight: 600;
  padding: 14px 0;
  cursor: pointer;
  transition: transform .1s ease;
}

.button-23:active {
  transform: scale(0.96);
  background-color: #F7F7F7;
}

</style>
</head>

<body>

<div class="container">

<input id="input" readonly>

<div id="result" class="result"></div>

</div>

<div class="keyboard" id="keyboard">

<button class="button-23" onclick="add('1')">1</button>
<button class="button-23" onclick="add('2')">2</button>
<button class="button-23" onclick="add('3')">3</button>

<button class="button-23" onclick="add('4')">4</button>
<button class="button-23" onclick="add('5')">5</button>
<button class="button-23" onclick="add('6')">6</button>

<button class="button-23" onclick="add('7')">7</button>
<button class="button-23" onclick="add('8')">8</button>
<button class="button-23" onclick="add('9')">9</button>

<button class="button-23" onclick="add('с')">с</button>
<button class="button-23" onclick="add('0')">0</button>
<button class="button-23" onclick="clearAll()">⌫</button>

<button class="button-23" onclick="add('sp')">sp</button>
<button class="button-23" onclick="add('ts')">ts</button>

</div>

<script>

const k = document.getElementById("keyboard");
const input = document.getElementById("input");
const resultBox = document.getElementById("result");

let lastScrollY = window.scrollY;

/* =======================
   👆 ТАП В БУДЬ-ЯКЕ МІСЦЕ → ПОКАЗАТИ
======================= */
document.addEventListener("touchstart", (e) => {

    const t = e.target;

    if (k.contains(t)) return;

    showKeyboard();
});

/* =======================
   📜 СКРОЛ → СХОВАТИ
======================= */
window.addEventListener("scroll", () => {

    let y = window.scrollY;

    if (Math.abs(y - lastScrollY) > 5) {
        hideKeyboard();
    }

    lastScrollY = y;
});

/* =======================
   ФУНКЦІЇ
======================= */
function showKeyboard(){
    k.classList.remove("hide");
}

function hideKeyboard(){
    k.classList.add("hide");
}

/* =======================
   ПОШУК
======================= */

const url = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + new Date().getTime();

let data = [];

fetch(url)
.then(r => r.text())
.then(t => {
    data = t.trim().split("\n").map(r => {
        let c = r.split(",");
        return {
            station: c[0] || "",
            material: c[1] || "",
            article: c[2] || ""
        };
    });
});

function add(v){
    input.value += v;
    search();
}

function clearAll(){
    input.value = "";
    resultBox.innerHTML = "";
}

function search(){

    let v = input.value.toLowerCase();
    if(!v) return resultBox.innerHTML = "";

    const isNumber = /^\d+$/.test(v);

    const result = {};

    data.forEach(x => {

        const match =
            (x.station && (
                isNumber
                    ? x.station.toString().toLowerCase().endsWith(v)
                    : x.station.toString().toLowerCase().includes(v)
            )) ||
            (x.material && (
                isNumber
                    ? x.material.toString().toLowerCase().endsWith(v)
                    : x.material.toString().toLowerCase().includes(v)
            )) ||
            (x.article && (
                isNumber
                    ? x.article.toString().toLowerCase().endsWith(v)
                    : x.article.toString().toLowerCase().includes(v)
            ));

        if (match) {

            if (!result[x.article]) result[x.article] = {};
            if (!result[x.article][x.material]) result[x.article][x.material] = new Set();

            result[x.article][x.material].add(x.station);
        }
    });

    let html = "";

    Object.keys(result).forEach(article => {

        html += `
            <div style="margin-bottom:15px; padding:12px; border:1px solid #e5e7eb; border-radius:14px; background:#fafafa;">
                <div style="font-weight:bold; font-size:20px; margin-bottom:6px;">
                    ${article}
                </div>
        `;

        Object.keys(result[article]).forEach(material => {

            html += `
                <div style="margin-left:8px; margin-bottom:6px;">
                    <div style="color:#555;">📦 ${material}</div>
                    <div style="font-size:13px; color:#888; padding-left:10px;">
                        ${[...result[article][material]].map(s => `<div>${s}</div>`).join("")}
                    </div>
                </div>
            `;
        });

        html += `</div>`;
    });

    resultBox.innerHTML = html || "Не знайдено";
}

</script>

</body>
</html>
