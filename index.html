<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Пошук</title>
<style>
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, Arial, sans-serif;
    background: #fff;
    touch-action: none;
}

#pages {
    display: flex;
    width: 200%;
    height: 100%;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}

.page {
    width: 50%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* SEARCH PAGE */
#page1 { background: #fff; }

.search-header {
    padding: 16px 16px 8px;
    padding-top: calc(16px + env(safe-area-inset-top));
    flex-shrink: 0;
}

input#input {
    width: 100%;
    padding: 16px 18px;
    font-size: 22px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    outline: none;
    background: #f9fafb;
    color: #111;
    caret-color: transparent;
}

.scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 8px 16px 16px;
    overscroll-behavior: contain;
}

.result-card {
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    background: #fafafa;
}

.result-article {
    font-weight: 700;
    font-size: 20px;
    color: #111;
    margin-bottom: 6px;
}

.result-material { margin-left: 6px; margin-bottom: 4px; }
.result-material-name { font-size: 15px; color: #333; }
.result-stations { font-size: 13px; color: #888; padding-left: 10px; }

.empty-msg {
    text-align: center;
    padding: 40px 20px;
    color: #aaa;
    font-size: 16px;
}

/* KEYBOARD */
#keyboard {
    flex-shrink: 0;
    padding: 12px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    background: #fff;
    border-top: 1px solid #e5e7eb;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    transform: translateY(0);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
}

#keyboard.hidden {
    transform: translateY(110%);
}

/* BUTTON-23 STYLE */
.btn {
    background-color: #FFFFFF;
    border: 1px solid #222222;
    border-radius: 8px;
    color: #222222;
    cursor: pointer;
    display: block;
    font-family: Circular, -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", sans-serif;
    font-size: 18px;
    font-weight: 600;
    line-height: 20px;
    outline: none;
    padding: 15px 0;
    text-align: center;
    touch-action: manipulation;
    transition: box-shadow .2s, transform .1s;
    user-select: none;
    -webkit-user-select: none;
    width: 100%;
}

.btn:focus-visible {
    box-shadow: #222222 0 0 0 2px, rgba(255,255,255,0.8) 0 0 0 4px;
}

.btn:active {
    background-color: #F7F7F7;
    border-color: #000000;
    transform: scale(.96);
}

/* TABLE PAGE */
#page2 { background: #fff; }

.table-header {
    padding: 16px;
    padding-top: calc(16px + env(safe-area-inset-top));
    border-bottom: 1px solid #e5e7eb;
    flex-shrink: 0;
}

.table-title {
    font-size: 17px;
    font-weight: 700;
    color: #111;
}

.table-scroll {
    flex: 1;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
}

table {
    border-collapse: collapse;
    font-size: 13px;
    min-width: 100%;
}

th {
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    padding: 10px 8px;
    text-align: left;
    white-space: nowrap;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
}

th.sorted { background: #dbeafe; color: #1e40af; }
th:active { background: #e2e8f0; }

td {
    border: 1px solid #e2e8f0;
    padding: 8px;
    white-space: nowrap;
    color: #374151;
}

tr:nth-child(even) td { background: #f9fafb; }

.table-loading {
    text-align: center;
    padding: 60px 20px;
    color: #9ca3af;
    font-size: 15px;
}

/* Page dots */
.page-dots {
    position: fixed;
    bottom: calc(8px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 100;
    pointer-events: none;
}

.dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d1d5db;
    transition: background 0.2s, transform 0.2s;
}

.dot.active {
    background: #374151;
    transform: scale(1.3);
}
</style>
</head>
<body>

<div id="pages">

    <!-- PAGE 1: SEARCH -->
    <div class="page" id="page1">
        <div class="search-header">
            <input id="input" readonly autocomplete="off" spellcheck="false">
        </div>
        <div class="scroll-area" id="scroll-area">
            <div id="result"></div>
        </div>
        <div id="keyboard">
            <button class="btn" data-v="1">1</button>
            <button class="btn" data-v="2">2</button>
            <button class="btn" data-v="3">3</button>
            <button class="btn" data-v="4">4</button>
            <button class="btn" data-v="5">5</button>
            <button class="btn" data-v="6">6</button>
            <button class="btn" data-v="7">7</button>
            <button class="btn" data-v="8">8</button>
            <button class="btn" data-v="9">9</button>
            <button class="btn" data-v="с">с</button>
            <button class="btn" data-v="0">0</button>
            <button class="btn" data-del="1">⌫</button>
            <button class="btn" data-v="sp">sp</button>
            <button class="btn" data-v="ts">ts</button>
        </div>
    </div>

    <!-- PAGE 2: TABLE -->
    <div class="page" id="page2">
        <div class="table-header">
            <span class="table-title">Таблиця</span>
        </div>
        <div class="table-scroll" id="table-scroll">
            <div class="table-loading" id="table-loading">⏳ Завантаження...</div>
        </div>
    </div>

</div>

<div class="page-dots">
    <div class="dot active" id="dot0"></div>
    <div class="dot" id="dot1"></div>
</div>

<script>
let currentPage = 0;
let kbVisible = true;

const pages = document.getElementById('pages');
const keyboard = document.getElementById('keyboard');
const input = document.getElementById('input');
const resultBox = document.getElementById('result');
const scrollArea = document.getElementById('scroll-area');
const tableScroll = document.getElementById('table-scroll');

function goToPage(n) {
    currentPage = n;
    pages.style.transform = `translateX(-${n * 50}%)`;
    document.getElementById('dot0').classList.toggle('active', n === 0);
    document.getElementById('dot1').classList.toggle('active', n === 1);
    if (n === 1) { hideKeyboard(); loadTable(); }
}

function showKeyboard() {
    if (currentPage !== 0) return;
    kbVisible = true;
    keyboard.classList.remove('hidden');
}

function hideKeyboard() {
    kbVisible = false;
    keyboard.classList.add('hidden');
}

document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => {
        if (btn.dataset.del) {
            input.value = input.value.slice(0, -1);
        } else {
            input.value += btn.dataset.v;
        }
        search();
    });
});

/* SEARCH DATA */
const url1 = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + Date.now();
let searchData = [];

fetch(url1).then(r => r.text()).then(t => {
    searchData = t.trim().split("\n").map(r => {
        const c = r.split(",");
        return { station: c[0]||"", material: c[1]||"", article: c[2]||"" };
    });
});

function search() {
    const v = input.value.toLowerCase();
    if (!v) { resultBox.innerHTML = ""; return; }
    const isNum = /^\d+$/.test(v);
    const result = {};
    searchData.forEach(x => {
        const match =
            (x.station  && (isNum ? x.station.toLowerCase().endsWith(v)  : x.station.toLowerCase().includes(v)))  ||
            (x.material && (isNum ? x.material.toLowerCase().endsWith(v) : x.material.toLowerCase().includes(v))) ||
            (x.article  && (isNum ? x.article.toLowerCase().endsWith(v)  : x.article.toLowerCase().includes(v)));
        if (match) {
            if (!result[x.article]) result[x.article] = {};
            if (!result[x.article][x.material]) result[x.article][x.material] = new Set();
            result[x.article][x.material].add(x.station);
        }
    });
    const keys = Object.keys(result);
    if (!keys.length) { resultBox.innerHTML = '<div class="empty-msg">Не знайдено</div>'; return; }
    let html = "";
    keys.forEach(article => {
        html += `<div class="result-card"><div class="result-article">${article}</div>`;
        Object.keys(result[article]).forEach(material => {
            html += `<div class="result-material">
                <div class="result-material-name">📦 ${material}</div>
                <div class="result-stations">${[...result[article][material]].map(s=>`<div>${s}</div>`).join("")}</div>
            </div>`;
        });
        html += `</div>`;
    });
    resultBox.innerHTML = html;
}

/* TABLE DATA */
const url2 = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=421001458&t=" + Date.now();
let tableRows = [], tableHeaders = [], sortCol = -1, sortAsc = true, tableLoaded = false;

function parseCSV(row) {
    const res = []; let cur = "", q = false;
    for (let i = 0; i < row.length; i++) {
        const c = row[i];
        if (c === '"') { q = !q; }
        else if (c === ',' && !q) { res.push(cur.trim()); cur = ""; }
        else cur += c;
    }
    res.push(cur.trim());
    return res;
}

function loadTable() {
    if (tableLoaded) return;
    fetch(url2).then(r => r.text()).then(t => {
        const lines = t.trim().split("\n");
        tableHeaders = parseCSV(lines[0]);
        tableRows = lines.slice(1).map(l => parseCSV(l));
        tableLoaded = true;
        renderTable();
    }).catch(() => {
        document.getElementById('table-loading').textContent = "❌ Помилка завантаження";
    });
}

function renderTable() {
    let rows = [...tableRows];
    if (sortCol >= 0) {
        rows.sort((a, b) => {
            const av = a[sortCol]||"", bv = b[sortCol]||"";
            const an = parseFloat(av), bn = parseFloat(bv);
            if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an-bn : bn-an;
            return sortAsc ? av.localeCompare(bv,'uk') : bv.localeCompare(av,'uk');
        });
    }
    let html = '<table><thead><tr>';
    tableHeaders.forEach((h, i) => {
        const s = sortCol === i;
        html += `<th class="${s?'sorted':''}" onclick="doSort(${i})">${h}${s?(sortAsc?' ↑':' ↓'):''}</th>`;
    });
    html += '</tr></thead><tbody>';
    rows.forEach(r => {
        html += '<tr>' + tableHeaders.map((_,i) => `<td>${r[i]||''}</td>`).join('') + '</tr>';
    });
    html += '</tbody></table>';
    tableScroll.innerHTML = html;
}

function doSort(col) {
    sortAsc = sortCol === col ? !sortAsc : true;
    sortCol = col;
    renderTable();
}

/* GESTURES */
let tx = 0, ty = 0, moved = false, isScrolling = null;

document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    tx = t.clientX; ty = t.clientY;
    moved = false; isScrolling = null;
}, { passive: true });

document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const dx = t.clientX - tx;
    const dy = t.clientY - ty;
    if (isScrolling === null) {
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) isScrolling = false;
        else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 8) isScrolling = true;
    }
    moved = true;
    if (isScrolling === true && kbVisible) hideKeyboard();
}, { passive: true });

document.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    const dx = t.clientX - tx;
    const dy = t.clientY - ty;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);

    if (!moved || (absDx < 8 && absDy < 8)) {
        if (keyboard.contains(e.target)) return;
        if (currentPage === 0) kbVisible ? hideKeyboard() : showKeyboard();
        return;
    }

    if (isScrolling === false && absDx > 50 && absDx > absDy * 1.5) {
        if (dx < 0 && currentPage === 0) goToPage(1);
        if (dx > 0 && currentPage === 1) goToPage(0);
    }
}, { passive: true });

document.addEventListener('touchstart', e => {
    if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
</script>
</body>
</html>
