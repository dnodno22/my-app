<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: stretch;
}

.container {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    background: #ffffff;
    padding: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* INPUT — ЗБІЛЬШЕНО */
input {
    width: 100%;
    padding: 18px;
    font-size: 24px; /* було 20px */
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;
}

/* KEYBOARD */
.keyboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 10px;
}

/* BUTTONS — ЗБІЛЬШЕНО */
button {
    padding: 18px;
    font-size: 20px; /* було 18px */
    border: none;
    border-radius: 14px;
    background: #e9ecef;
    color: #111;
    font-weight: 600;
}

/* RESULT — ЗБІЛЬШЕНО */
.result {
    flex: 1;
    overflow-y: auto;
    font-size: 18px; /* було 16px */
    line-height: 1.6;
    color: #333;
    padding-top: 10px;
}

button:active {
    transform: scale(0.96);
    background: #dfe3e8;
}

* {
    -webkit-tap-highlight-color: transparent;
}

</style>
