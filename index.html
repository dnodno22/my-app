<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">   

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-bottom: 220px;
}

input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;
}

.result {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

/* PANEL */
.side-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    max-width: 420px;
    height: 100%;
    background: #fff;
    z-index: 20;
    padding: 10px;
    overflow: auto;
    transition: right 0.3s ease;
}

.side-panel.show {
    right: 0;
}

</style>
</head>

<body>

<div class="container">

<input id="input" readonly>
<div id="result" class="result"></div>

</div>

<div class="side-panel" id="panel"></div>

<script>

const input = document.getElementById("input");
const resultBox = document.getElementById("result");
const panel = document.getElementById("panel");

const baseID = "1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8";

const gidMain = "1679964111";
const gidAlt  = "421001458";

let data = [];
let currentGid = gidMain;

/* =======================
   LOAD SHEET (FIXED)
======================= */

function loadSheet(gid){

    currentGid = gid;

    const url = `https://docs.google.com/spreadsheets/d/${baseID}/gviz/tq?tqx=out:csv&gid=${gid}`;

    fetch(url)
    .then(r => r.text())
    .then(t => {

        const rows = t.split("\n").filter(r => r.trim());

        data = rows.map(r => {
            const c = r.split(",");

            return {
                station: (c[0] || "").replace(/"/g,'').trim(),
                material: (c[1] || "").replace(/"/g,'').trim(),
                article: (c[2] || "").replace(/"/g,'').trim()
            };
        });

        input.value = "";
        resultBox.innerHTML = "";
    });
}

/* старт */
loadSheet(gidMain);

/* =======================
   SEARCH
======================= */

function search(){

    let v = input.value.toLowerCase();
    if(!v) return resultBox.innerHTML = "";

    const isNumber = /^\d+$/.test(v);
    const result = {};

    data.forEach(x => {

        const match =
            (x.station && (isNumber ? x.station.toLowerCase().endsWith(v) : x.station.toLowerCase().includes(v))) ||
            (x.material && (isNumber ? x.material.toLowerCase().endsWith(v) : x.material.toLowerCase().includes(v))) ||
            (x.article && (isNumber ? x.article.toLowerCase().endsWith(v) : x.article.toLowerCase().includes(v)));

        if (match) {

            if (!result[x.article]) result[x.article] = {};
            if (!result[x.article][x.material]) result[x.article][x.material] = new Set();

            result[x.article][x.material].add(x.station);
        }
    });

    let html = "";

    Object.keys(result).forEach(article => {

        html += `
            <div style="margin-bottom:15px; padding:12px; border:1px solid #e5e7eb; border-radius:14px; background:#fafafa;">
                <div style="font-weight:bold; font-size:20px;">
                    ${article}
                </div>
        `;

        Object.keys(result[article]).forEach(material => {

            html += `
                <div style="margin-left:8px;">
                    <div>📦 ${material}</div>
                    <div style="font-size:13px; color:#888; padding-left:10px;">
                        ${[...result[article][material]].map(s => `<div>${s}</div>`).join("")}
                    </div>
                </div>
            `;
        });

        html += `</div>`;
    });

    resultBox.innerHTML = html || "Не знайдено";
}

/* =======================
   INPUT
======================= */

function add(v){
    input.value += v;
    search();
}

function clearAll(){
    input.value = "";
    resultBox.innerHTML = "";
}

/* =======================
   SWIPE (FIXED)
======================= */

let startX = 0;
let startY = 0;

const SWIPE_MIN = 70;

document.addEventListener("touchstart", (e) => {

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

}, { passive: true });

document.addEventListener("touchend", (e) => {

    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;

    const dx = endX - startX;
    const dy = endY - startY;

    if (Math.abs(dx) < SWIPE_MIN || Math.abs(dx) < Math.abs(dy)) return;

    // ⬅️ вліво → Аркуш3
    if (dx < 0) {
        loadSheet(gidAlt);
    }

    // ➡️ вправо → головний
    if (dx > 0) {
        loadSheet(gidMain);
    }

}, { passive: true });

/* =======================
   SCROLL
======================= */

window.addEventListener("scroll", () => {
    // нічого не ламаємо
});

</script>

</body>
</html>
