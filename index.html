<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
    height: 100vh;
    overflow: hidden;
}

/* ВЕРХНЯ ЧАСТИНА (СКРОЛ) */
.container {
    position: absolute;
    top: 0;
    bottom: 220px; /* місце під клавіатуру */
    left: 0;
    right: 0;

    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    padding: 16px;

    overflow-y: auto;
}

/* INPUT */
input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;

    position: sticky;
    top: 0;
    z-index: 10;
}

/* RESULT */
.result {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

/* КЛАВІАТУРА ЗНИЗУ */
.keyboard {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);

    width: 100%;
    max-width: 420px;

    background: #ffffff;
    padding: 12px;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    border-top: 1px solid #e5e7eb;
}

/* BUTTONS */
button {
    padding: 18px;
    font-size: 20px;
    border: none;
    border-radius: 14px;
    background: #e9ecef;
    font-weight: 600;
}

button:active {
    transform: scale(0.96);
    background: #dfe3e8;
}

hr {
    border: none;
    border-top: 1px solid #eee;
    margin: 10px 0;
}

</style>
</head>

<body>

<div class="container">

<input id="input" readonly>

<div id="result" class="result"></div>

</div>

<div class="keyboard">

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>

<div></div>
<button onclick="add('0')">0</button>
<button onclick="clearAll()">⌫</button>

<button onclick="add('sp')">sp</button>
<button onclick="add('ts')">ts</button>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + new Date().getTime();

let data = [];

fetch(url)
.then(res => res.text())
.then(text => {

    let rows = text.trim().split("\n");

    data = rows.map(r => {
        let c = r.split(",");
        return {
            station: c[0] || "",
            material: c[1] || "",
            article: c[2] || ""
        };
    });
});

function add(val){
    document.getElementById("input").value += val;
    search();
}

function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("result").innerHTML = "";
}

function search(){

    let val = document.getElementById("input").value.toLowerCase();

    if(val === ""){
        document.getElementById("result").innerHTML = "";
        return;
    }

    let res = data.filter(x =>
        (x.station && x.station.toLowerCase().includes(val)) ||
        (x.material && x.material.toLowerCase().includes(val)) ||
        (x.article && x.article.toLowerCase().includes(val))
    );

    if(res.length > 0){

        document.getElementById("result").innerHTML = res.map(r => `
            <b>Станція:</b> ${r.station}<br>
            <b>Матеріал:</b> ${r.material}<br>
            <b>Артикул:</b> ${r.article}
            <hr>
        `).join("");

    } else {
        document.getElementById("result").innerHTML = "Не знайдено";
    }
}

</script>

</body>
</html>
