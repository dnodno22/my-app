<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
}

/* КОНТЕЙНЕР */
.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;

    padding-bottom: 260px; /* 🔥 резерв під клавіатуру */
}

/* INPUT */
input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;

    position: sticky;
    top: 0;
    z-index: 10;
}

/* RESULT */
.result {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

/* KEYBOARD */
.keyboard {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;

    width: 100%;
    max-width: 420px;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    padding: 14px;

    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border-top: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 -8px 20px rgba(0,0,0,0.06);

    border-top-left-radius: 18px;
    border-top-right-radius: 18px;

    transition: transform 0.25s ease, opacity 0.25s ease;

    z-index: 9999; /* 🔥 ВАЖЛИВО */
}

/* HIDE */
.keyboard.hide {
    transform: translateX(-50%) translateY(120%);
    opacity: 0;
}

/* BUTTON */
.button-23 {
  background-color: #FFFFFF;
  border: 1px solid #222222;
  border-radius: 8px;
  color: #222;
  font-size: 16px;
  font-weight: 600;

  padding: 14px 0;

  cursor: pointer;
  transition: transform .1s ease;
}

.button-23:active {
  transform: scale(0.96);
  background-color: #F7F7F7;
}

hr {
    border: none;
    border-top: 1px solid #eee;
    margin: 10px 0;
}

</style>
</head>

<body>

<div class="container">

<input id="input" readonly>

<div id="result" class="result"></div>

</div>

<div class="keyboard" id="keyboard">

<button class="button-23" onclick="add('1')">1</button>
<button class="button-23" onclick="add('2')">2</button>
<button class="button-23" onclick="add('3')">3</button>

<button class="button-23" onclick="add('4')">4</button>
<button class="button-23" onclick="add('5')">5</button>
<button class="button-23" onclick="add('6')">6</button>

<button class="button-23" onclick="add('7')">7</button>
<button class="button-23" onclick="add('8')">8</button>
<button class="button-23" onclick="add('9')">9</button>

<div></div>
<button class="button-23" onclick="add('0')">0</button>
<button class="button-23" onclick="clearAll()">⌫</button>

<button class="button-23" onclick="add('sp')">sp</button>
<button class="button-23" onclick="add('ts')">ts</button>

</div>

<script>

const keyboard = document.getElementById("keyboard");

let lastScroll = 0;
let lastTime = Date.now();

/* 🔥 менш чутлива швидкість */
const SPEED_THRESHOLD = 1.4;

window.addEventListener("scroll", () => {

    let current = window.scrollY;
    let now = Date.now();

    let deltaY = current - lastScroll;
    let deltaT = now - lastTime;

    let speed = Math.abs(deltaY / deltaT);

    let atTop = current <= 5;

    // ↓ вниз → ховаємо
    if (deltaY > 0) {
        keyboard.classList.add("hide");
    }

    // ↑ швидкий скрол → показ
    if (deltaY < 0 && speed > SPEED_THRESHOLD) {
        keyboard.classList.remove("hide");
    }

    // 🔥 завжди показати на самому верху
    if (atTop) {
        keyboard.classList.remove("hide");
    }

    lastScroll = current;
    lastTime = now;
});

</script>

</body>
</html>
