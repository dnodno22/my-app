<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Пошук</title>
<style>
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: -apple-system, Arial, sans-serif;
    background: #fff; touch-action: none;
}

#pages { display: flex; height: 100%; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
.page { height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; flex-shrink: 0; }

/* SEARCH PAGE */
.search-header { padding: 16px 16px 8px; padding-top: calc(16px + env(safe-area-inset-top)); flex-shrink: 0; }
input#input {
    width: 100%; padding: 16px 18px; font-size: 22px; border-radius: 14px;
    border: 1px solid #e5e7eb; text-align: center; outline: none;
    background: #f9fafb; color: #111; caret-color: transparent; height: 60px;
}

.scroll-area { flex: 1; overflow-y: auto; padding: 8px 16px 16px; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.result-card { margin-bottom: 12px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 14px; background: #fafafa; }
.result-article { font-weight: 700; font-size: 20px; color: #111; margin-bottom: 6px; }
.result-material-name { font-size: 15px; color: #666; margin-bottom: 4px; display: flex; justify-content: space-between; }
.result-address { color: #059669; font-weight: 600; font-size: 14px; }
.result-stations { font-size: 24px; font-weight: 800; color: #000; }

/* HIGHLIGHT */
mark.hl {
    background: none;
    color: inherit;
    border-bottom: 2px solid #111;
    padding: 0;
    font-weight: inherit;
}

/* KEYBOARDS */
.kb-container {
    flex-shrink: 0; background: #fff; border-top: 1px solid #e5e7eb;
    padding: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom));
}
.kb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.hidden { display: none !important; }

.btn {
    background: #fff; border: 1px solid #222; border-radius: 8px;
    color: #222; font-size: 18px; font-weight: 600; padding: 15px 0;
    text-align: center; touch-action: manipulation; user-select: none;
}
.btn:active { background: #F7F7F7; transform: scale(.96); }
.btn-special { background: #f1f5f9; }

/* КАРУСЕЛЬ ДОДАТКОВИХ КНОПОК (sp, ts, стр, мм, ...) */
.kb-carousel {
    display: none; gap: 10px; margin-top: 10px;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x;
    scroll-snap-type: x proximity;
    scrollbar-width: none;
}
.kb-carousel.visible { display: flex; }
.kb-carousel::-webkit-scrollbar { display: none; }
.kb-carousel .btn {
    flex: 0 0 auto; width: calc((100% - 20px) / 3); padding: 15px 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    scroll-snap-align: start;
}

/* TABLE PAGES */
.table-page { background: #fff; }
.table-header { padding: 16px; padding-top: calc(16px + env(safe-area-inset-top)); border-bottom: 1px solid #e5e7eb; flex-shrink: 0; display: flex; justify-content: space-between; align-items: baseline; }
.table-title { font-weight: 700; font-size: 16px; color: #111; }
.table-updated { font-size: 11px; color: #9ca3af; }
.table-scroll { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
table { border-collapse: collapse; font-size: 13px; min-width: 100%; }
th { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 12px 8px; position: sticky; top: 0; text-align: left; font-weight: 700; color: #333; }
td { border: 1px solid #e2e8f0; padding: 8px; white-space: nowrap; color: #444; }
tr:nth-child(even) td { background: #f9fafb; }

.page-dots { position: fixed; bottom: calc(8px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); display: flex; gap: 5px; pointer-events: none; z-index: 10; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #d1d5db; }
.dot.active { background: #374151; transform: scale(1.4); }
</style>
</head>
<body>

<div id="pages">
    <!-- PAGE 0: SEARCH -->
    <div class="page" id="page0">
        <div class="search-header"><input id="input" readonly></div>
        <div class="scroll-area"><div id="result"></div></div>
        <div id="kb-wrapper" class="kb-container">
            <div id="kb1" class="kb-grid">
                <button class="btn" data-v="1">1</button>
                <button class="btn" data-v="2">2</button>
                <button class="btn" data-v="3">3</button>
                <button class="btn" data-v="4">4</button>
                <button class="btn" data-v="5">5</button>
                <button class="btn" data-v="6">6</button>
                <button class="btn" data-v="7">7</button>
                <button class="btn" data-v="8">8</button>
                <button class="btn" data-v="9">9</button>
                <button class="btn" data-v="с">с</button>
                <button class="btn" data-v="0">0</button>
                <button class="btn btn-special" data-del="all">⌫</button>
            </div>
            <div id="kb-carousel" class="kb-carousel"></div>
        </div>
    </div>
    <!-- TABLE PAGES генеруються скриптом нижче -->
</div>

<div class="page-dots" id="page-dots"></div>

<script>
/* ==================== НАЛАШТУВАННЯ АРКУШІВ ====================
   Кожен об'єкт — це один аркуш Google-таблиці, який буде доступний
   для гортання свайпом. label можна змінити на реальну назву аркуша. */
const SPREADSHEET_ID = "1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8";
// label не задаємо тут — назва сторінки береться з клітинки A1 кожного аркуша
const TABLE_SHEETS = [
    { gid: "421001458" },
    { gid: "1146686549" },
    { gid: "2115582321" },
    { gid: "994923423" },
    { gid: "194111037" },
    { gid: "167896896" },
    { gid: "673306471" }
];
const SEARCH_GID = "1679964111";
/* ================================================================ */

const TOTAL_PAGES = 1 + TABLE_SHEETS.length; // сторінка пошуку + всі аркуші таблиці
let currentPage = 0;
let searchData = [];

const input = document.getElementById('input');
const resultBox = document.getElementById('result');
const kbWrapper = document.getElementById('kb-wrapper');
const pagesEl = document.getElementById('pages');
const dotsEl = document.getElementById('page-dots');

const CACHE_KEY_SEARCH = "searchDataCSV";

/* ---------- Побудова сторінок таблиць та крапок ---------- */
const tableState = []; // { gid, label, headers, rows, sortCol, sortAsc, loadedOnce, cacheKey, cacheTimeKey, contentEl, updatedEl }

TABLE_SHEETS.forEach((sheet, idx) => {
    const pageEl = document.createElement('div');
    pageEl.className = 'page table-page';
    pageEl.id = 'page' + (idx + 1);
    pageEl.innerHTML = `
        <div class="table-header">
            <span class="table-title" id="table-title-${idx}">…</span>
            <span class="table-updated" id="table-updated-${idx}"></span>
        </div>
        <div class="table-scroll">
            <div id="table-content-${idx}"><div style="text-align:center; padding:40px; color:#999;">⏳ Завантаження...</div></div>
        </div>`;
    pagesEl.appendChild(pageEl);

    tableState.push({
        gid: sheet.gid,
        title: "",
        headers: [],
        rows: [],
        sortCol: -1,
        sortAsc: true,
        loadedOnce: false,
        cacheKey: "tableDataCSV_" + sheet.gid,
        cacheTimeKey: "tableDataTime_" + sheet.gid,
        contentEl: null,
        updatedEl: null,
        titleEl: null
    });
});

// зберігаємо посилання на елементи після вставки в DOM
tableState.forEach((st, idx) => {
    st.contentEl = document.getElementById('table-content-' + idx);
    st.updatedEl = document.getElementById('table-updated-' + idx);
    st.titleEl = document.getElementById('table-title-' + idx);
});

// однакова ширина для всіх сторінок
const pageWidthPercent = 100 / TOTAL_PAGES;
document.querySelectorAll('.page').forEach(p => { p.style.width = pageWidthPercent + '%'; });
pagesEl.style.width = (TOTAL_PAGES * 100) + '%';

// крапки
for (let i = 0; i < TOTAL_PAGES; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot' + i;
    dotsEl.appendChild(d);
}

/* ---------- Клавіатура (сторінка пошуку) ---------- */

// Кнопки каруселі — щоб додати нову, просто допишіть value в масив
const CAROUSEL_KEYS = ["sp", "ts", "стр", "мм", "передмонтаж"];
const carouselEl = document.getElementById('kb-carousel');
CAROUSEL_KEYS.forEach(v => {
    const b = document.createElement('button');
    b.className = 'btn';
    b.dataset.v = v;
    b.textContent = v;
    carouselEl.appendChild(b);
});

// Показ/приховування каруселі
function showCarousel() { carouselEl.classList.add('visible'); }
function hideCarousel() { carouselEl.classList.remove('visible'); }

// Свайп усередині каруселі: горизонтальний — гортання кнопок (не чіпаємо сторінки),
// вертикальний вниз — ховає карусель
let carouselStartX = 0, carouselStartY = 0;
carouselEl.addEventListener('touchstart', (e) => {
    carouselStartX = e.touches[0].clientX;
    carouselStartY = e.touches[0].clientY;
    e.stopPropagation();
}, {passive:true});
carouselEl.addEventListener('touchmove', (e) => { e.stopPropagation(); }, {passive:true});
carouselEl.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - carouselStartX;
    const dy = e.changedTouches[0].clientY - carouselStartY;
    if (Math.abs(dy) > Math.abs(dx) && dy > 40) { hideCarousel(); }
    e.stopPropagation();
}, {passive:true});

// Свайп вгору/вниз по самій клавіатурі (цифровий блок) — показ/приховування каруселі
let kbStartX = 0, kbStartY = 0, kbMoved = false;
kbWrapper.addEventListener('touchstart', (e) => {
    kbStartX = e.touches[0].clientX;
    kbStartY = e.touches[0].clientY;
    kbMoved = false;
}, {passive:true});
kbWrapper.addEventListener('touchmove', () => { kbMoved = true; }, {passive:true});
kbWrapper.addEventListener('touchend', (e) => {
    if (!kbMoved) return;
    const dx = e.changedTouches[0].clientX - kbStartX;
    const dy = e.changedTouches[0].clientY - kbStartY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 40) {
        if (dy < 0) showCarousel(); else hideCarousel();
    }
}, {passive:true});

document.getElementById('kb-wrapper').addEventListener('click', (e) => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    e.stopPropagation();
    if (btn.dataset.del) { input.value = ""; }
    else if (btn.dataset.v !== undefined) { input.value += btn.dataset.v; }
    search();
});

function parseSearchCSV(t) {
    searchData = t.trim().split("\n").map(r => {
        const c = r.split(",");
        return {
            station: c[0]||"",
            material: c[1]||"",
            article: c[2]||"",
            colD: c[3]||"",
            address: c[4]||""
        };
    });
}

// 1. СПОЧАТКУ дивимось у кеш і одразу малюємо, якщо там щось є
const cachedSearch = localStorage.getItem(CACHE_KEY_SEARCH);
if (cachedSearch) {
    parseSearchCSV(cachedSearch);
    if (input.value) search();
}

// 2. ПОТІМ у фоні тягнемо свіжі дані і тихо оновлюємо кеш + список
function fetchSearchData() {
    const url1 = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${SEARCH_GID}&t=` + Date.now();
    fetch(url1)
    .then(r => r.text())
    .then(t => {
        localStorage.setItem(CACHE_KEY_SEARCH, t);
        parseSearchCSV(t);
        if (input.value) search();
    })
    .catch(() => {});
}
fetchSearchData();

// Екранування HTML перед вставкою
function escapeHtml(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function highlight(text, v, fromEnd) {
    const safe = escapeHtml(text);
    if (!v) return safe;
    const lower = text.toLowerCase();
    if (fromEnd) {
        if (!lower.endsWith(v)) return safe;
        const idx = text.length - v.length;
        return escapeHtml(text.slice(0, idx)) + '<mark class="hl">' + escapeHtml(text.slice(idx)) + '</mark>';
    } else {
        if (!lower.startsWith(v)) return safe;
        return '<mark class="hl">' + escapeHtml(text.slice(0, v.length)) + '</mark>' + escapeHtml(text.slice(v.length));
    }
}

function search() {
    const v = input.value.toLowerCase();
    if (!v) { resultBox.innerHTML = ""; return; }
    const isNumOnly = /^\d+$/.test(v);
    const isSpecialSearch = v.includes("стр") || v.includes("мм");

    const filtered = searchData.filter(x => {
        if (isSpecialSearch) return x.colD.toLowerCase().startsWith(v);
        if (isNumOnly) {
            return x.station.toLowerCase().endsWith(v)
                || x.material.toLowerCase().endsWith(v)
                || x.article.toLowerCase().endsWith(v)
                || x.colD.toLowerCase().endsWith(v)
                || x.address.toLowerCase().endsWith(v);
        }
        return x.station.toLowerCase().startsWith(v)
            || x.material.toLowerCase().startsWith(v)
            || x.article.toLowerCase().startsWith(v)
            || x.colD.toLowerCase().startsWith(v)
            || x.address.toLowerCase().startsWith(v);
    });

    if (!filtered.length) { resultBox.innerHTML = '<div style="text-align:center; padding:40px; color:#aaa;">Не знайдено</div>'; return; }

    const grouped = {};
    filtered.forEach(x => {
        if (!grouped[x.article]) grouped[x.article] = {};
        const matKey = x.material + "|" + x.address;
        if (!grouped[x.article][matKey]) grouped[x.article][matKey] = new Set();
        grouped[x.article][matKey].add(x.station);
    });

    let html = "";
    for (let art in grouped) {
        const artHtml = isSpecialSearch ? escapeHtml(art) : highlight(art, v, isNumOnly);
        html += `<div class="result-card"><div class="result-article">${artHtml}</div>`;
        for (let matKey in grouped[art]) {
            const [matName, matAddr] = matKey.split("|");
            const matHtml = isSpecialSearch ? escapeHtml(matName) : highlight(matName, v, isNumOnly);
            const addrHtml = isSpecialSearch ? escapeHtml(matAddr) : highlight(matAddr, v, isNumOnly);
            const stationsHtml = [...grouped[art][matKey]]
                .map(st => isSpecialSearch ? escapeHtml(st) : highlight(st, v, isNumOnly))
                .join(" | ");
            html += `<div style="margin-bottom:8px;">
                <div class="result-material-name">
                    <span>📦 ${matHtml}</span>
                    <span class="result-address">${addrHtml}</span>
                </div>
                <div class="result-stations">${stationsHtml}</div>
            </div>`;
        }
        html += `</div>`;
    }
    resultBox.innerHTML = html;
}

/* ---------- Таблиці (аркуші) ----------
   Рядок 1 (A1) кожного аркуша = назва сторінки.
   Рядок 2 = заголовки колонок таблиці. Рядок 3+ = дані. */
function parseTableCSV(t) {
    const lines = t.trim().split("\n").map(l => l.split(","));
    const title = (lines[0] && lines[0][0]) ? lines[0][0] : "";
    const headers = lines[1] || [];
    const rows = lines.slice(2);
    return { title, headers, rows };
}

function formatDate(ts) {
    const d = new Date(parseInt(ts, 10));
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function updateTableTimeDisplay(st) {
    const t = localStorage.getItem(st.cacheTimeKey);
    st.updatedEl.textContent = t ? ('оновлено ' + formatDate(t)) : '';
}

function loadTableByIndex(idx) {
    const st = tableState[idx];
    if (st.loadedOnce) return;
    st.loadedOnce = true;

    // 1. Спочатку кеш — одразу показуємо
    const cached = localStorage.getItem(st.cacheKey);
    if (cached) {
        const parsed = parseTableCSV(cached);
        st.title = parsed.title;
        st.headers = parsed.headers;
        st.rows = parsed.rows;
        st.titleEl.textContent = st.title || ('Аркуш ' + (idx + 1));
        renderTable(idx);
        updateTableTimeDisplay(st);
    }

    // 2. Потім тихо підтягуємо свіже
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${st.gid}&t=` + Date.now();
    fetch(url).then(r => r.text()).then(t => {
        localStorage.setItem(st.cacheKey, t);
        localStorage.setItem(st.cacheTimeKey, Date.now().toString());
        const parsed = parseTableCSV(t);
        st.title = parsed.title;
        st.headers = parsed.headers;
        st.rows = parsed.rows;
        st.titleEl.textContent = st.title || ('Аркуш ' + (idx + 1));
        renderTable(idx);
        updateTableTimeDisplay(st);
    }).catch(() => {});
}

function renderTable(idx) {
    const st = tableState[idx];
    let data = [...st.rows];
    if (st.sortCol >= 0) {
        data.sort((a, b) => {
            let v1 = a[st.sortCol] || "", v2 = b[st.sortCol] || "";
            let n1 = parseFloat(v1), n2 = parseFloat(v2);
            if (!isNaN(n1) && !isNaN(n2)) return st.sortAsc ? n1 - n2 : n2 - n1;
            return st.sortAsc ? v1.localeCompare(v2, 'uk') : v2.localeCompare(v1, 'uk');
        });
    }
    let h = '<table><thead><tr>';
    st.headers.forEach((name, i) => {
        h += `<th onclick="doSort(${idx}, ${i})">${escapeHtml(name)}${st.sortCol === i ? (st.sortAsc ? ' ↑' : ' ↓') : ''}</th>`;
    });
    h += '</tr></thead><tbody>';
    data.forEach(row => { h += '<tr>' + row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('') + '</tr>'; });
    st.contentEl.innerHTML = h + '</tbody></table>';
}

window.doSort = function(idx, col) {
    const st = tableState[idx];
    if (st.sortCol === col) st.sortAsc = !st.sortAsc;
    else { st.sortCol = col; st.sortAsc = true; }
    renderTable(idx);
};

/* ---------- Навігація між сторінками (свайп) ---------- */
function goToPage(n) {
    n = Math.max(0, Math.min(TOTAL_PAGES - 1, n));
    currentPage = n;
    document.getElementById('pages').style.transform = `translateX(-${n * pageWidthPercent}%)`;
    for (let i = 0; i < TOTAL_PAGES; i++) {
        document.getElementById('dot' + i).classList.toggle('active', i === n);
    }
    if (n === 0) {
        kbWrapper.classList.remove('hidden');
    } else {
        kbWrapper.classList.add('hidden');
        hideCarousel();
        loadTableByIndex(n - 1); // n=1 -> tableState[0], n=2 -> tableState[1], ...
    }
}

let tx = 0, moved = false;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; moved = false; }, {passive:true});
document.addEventListener('touchmove', () => { moved = true; }, {passive:true});
document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (moved && Math.abs(dx) > 60) {
        if (dx < 0) goToPage(currentPage + 1); // свайп вліво -> наступна сторінка
        if (dx > 0) goToPage(currentPage - 1); // свайп вправо -> попередня сторінка
    } else if (!moved && currentPage === 0 && !kbWrapper.contains(e.target)) {
        const willHide = !kbWrapper.classList.contains('hidden');
        kbWrapper.classList.toggle('hidden');
        if (willHide) hideCarousel();
    }
}, {passive:true});

// Свайп вгору по знайденому тексту (результатах пошуку) — ховає клавіатуру
const scrollAreaEl = document.querySelector('.scroll-area');
let resultStartY = 0, resultMoved = false;
scrollAreaEl.addEventListener('touchstart', (e) => {
    resultStartY = e.touches[0].clientY;
    resultMoved = false;
}, {passive:true});
scrollAreaEl.addEventListener('touchmove', () => { resultMoved = true; }, {passive:true});
scrollAreaEl.addEventListener('touchend', (e) => {
    if (!resultMoved) return;
    const dy = e.changedTouches[0].clientY - resultStartY;
    if (dy < -40 && !kbWrapper.classList.contains('hidden')) {
        kbWrapper.classList.add('hidden');
        hideCarousel();
    }
}, {passive:true});
</script>
</body>
</html>
