<script>

const input = document.getElementById("input");
const resultBox = document.getElementById("result");
const panel = document.getElementById("panel");
const keyboard = document.getElementById("keyboard");

/* ================= KEYBOARD STATE ================= */

function showKeyboard(){
    keyboard.classList.remove("hide");
}

function hideKeyboard(){
    keyboard.classList.add("hide");
}

function toggleKeyboard(){
    keyboard.classList.toggle("hide");
}

/* ================= DATA ================= */

let data = [];

const url = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + Date.now();

fetch(url)
.then(r => r.text())
.then(t => {
    data = t.trim().split("\n").map(r => {
        let c = r.split(",");
        return {
            station: c[0] || "",
            material: c[1] || "",
            article: c[2] || ""
        };
    });
});

/* ================= INPUT ================= */

function add(v){
    input.value += v;
    search();
}

function clearAll(){
    input.value = "";
    resultBox.innerHTML = "";
}

/* ================= SEARCH ================= */

function search(){

    let v = input.value.toLowerCase();
    if(!v) return resultBox.innerHTML = "";

    const isNumber = /^\d+$/.test(v);

    const result = {};

    data.forEach(x => {

        const match =
            (x.station && (isNumber ? x.station.toLowerCase().endsWith(v) : x.station.toLowerCase().includes(v))) ||
            (x.material && (isNumber ? x.material.toLowerCase().endsWith(v) : x.material.toLowerCase().includes(v))) ||
            (x.article && (isNumber ? x.article.toLowerCase().endsWith(v) : x.article.toLowerCase().includes(v)));

        if (match) {

            if (!result[x.article]) result[x.article] = {};
            if (!result[x.article][x.material]) result[x.article][x.material] = new Set();

            result[x.article][x.material].add(x.station);
        }
    });

    let html = "";

    Object.keys(result).forEach(article => {

        html += `<div style="margin-bottom:15px;padding:12px;border:1px solid #e5e7eb;border-radius:14px;background:#fafafa;">
        <div style="font-weight:bold;font-size:20px;">${article}</div>`;

        Object.keys(result[article]).forEach(material => {

            html += `<div style="margin-left:8px;">
                <div>📦 ${material}</div>
                <div style="font-size:13px;color:#888;padding-left:10px;">
                    ${[...result[article][material]].map(s=>`<div>${s}</div>`).join("")}
                </div>
            </div>`;
        });

        html += `</div>`;
    });

    resultBox.innerHTML = html || "Не знайдено";
}

/* ================= PANEL ================= */

function showPanel(){
    panel.classList.add("show");
    hideKeyboard();
}

function hidePanel(){
    panel.classList.remove("show");
    showKeyboard();
}

/* ================= SHEET 2 ================= */

let data2 = [];
let sortDir = {};

function openSheet2(){
    showPanel();
    panel.innerHTML = "Завантаження...";

    const url2 = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=421001458&t=" + Date.now();

    fetch(url2)
    .then(r => r.text())
    .then(t => {
        data2 = t.trim().split("\n").map(r => r.split(","));
        renderTable(data2);
    });
}

function renderTable(arr){

    let html = `<table><thead><tr>`;

    arr[0].forEach((h,i)=>{
        html += `<th onclick="sortTable(${i})">${h}</th>`;
    });

    html += `</tr></thead><tbody>`;

    arr.slice(1).forEach(r=>{
        html += `<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`;
    });

    html += `</tbody></table>`;

    panel.innerHTML = html;
}

function sortTable(col){

    sortDir[col] = !sortDir[col];

    const sorted = [...data2.slice(1)].sort((a,b)=>{
        let A = a[col] || "";
        let B = b[col] || "";

        if (!isNaN(A) && !isNaN(B))
            return sortDir[col] ? A-B : B-A;

        return sortDir[col]
            ? A.localeCompare(B)
            : B.localeCompare(A);
    });

    renderTable([data2[0], ...sorted]);
}

/* ================= STABLE SWIPE SYSTEM 2.0 ================= */

let startX = 0;
let startY = 0;
let startTime = 0;

const SWIPE_MIN = 80;
const MAX_MOVE = 12;
const MAX_TIME = 300;

document.addEventListener("pointerdown", (e) => {

    if (panel.contains(e.target) || keyboard.contains(e.target)) return;

    startX = e.clientX;
    startY = e.clientY;
    startTime = Date.now();
});

document.addEventListener("pointerup", (e) => {

    if (panel.contains(e.target) || keyboard.contains(e.target)) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const dt = Date.now() - startTime;

    const isSwipe = Math.abs(dx) > SWIPE_MIN && Math.abs(dx) > Math.abs(dy);
    const isTap = dt < MAX_TIME && Math.abs(dx) < MAX_MOVE && Math.abs(dy) < MAX_MOVE;

    /* ================= SWIPE ================= */
    if (isSwipe) {

        if (dx > 0) {
            showPanel();
        } else {
            hidePanel();
        }

        return;
    }

    /* ================= TAP ================= */
    if (isTap) {

        if (panel.classList.contains("show")) {
            hidePanel();
            return;
        }

        toggleKeyboard();
    }
});

</script>
