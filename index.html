<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-bottom: 220px;
}

/* INPUT */
input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;
    position: sticky;
    top: 0;
    z-index: 10;
}

/* RESULT */
.result {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

/* KEYBOARD (ОРИГІНАЛЬНИЙ СТИЛЬ ПОВЕРНУТО) */
.keyboard {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;

    width: 100%;
    max-width: 420px;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    padding: 14px;

    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);

    border-top: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 -8px 20px rgba(0,0,0,0.06);

    border-top-left-radius: 18px;
    border-top-right-radius: 18px;

    transition: transform 0.25s ease, opacity 0.25s ease;
}

.keyboard.hide {
    transform: translateX(-50%) translateY(120%);
    opacity: 0;
}

/* BUTTON */
.button-23 {
  background-color: #FFFFFF;
  border: 1px solid #222222;
  border-radius: 8px;
  color: #222;
  font-size: 16px;
  font-weight: 600;
  padding: 14px 0;
  cursor: pointer;
  transition: transform .1s ease;
}

.button-23:active {
  transform: scale(0.96);
  background-color: #F7F7F7;
}

/* PANEL */
.side-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    max-width: 420px;
    height: 100%;
    background: #fff;
    z-index: 20;
    padding: 10px;
    overflow: auto;
    transition: right 0.3s ease;
}

.side-panel.show {
    right: 0;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th {
    background: #f1f5f9;
    border: 1px solid #ddd;
    padding: 8px;
}

td {
    border: 1px solid #ddd;
    padding: 6px;
}

</style>
</head>

<body>

<div class="container">
    <input id="input" readonly>
    <div id="result" class="result"></div>
</div>

<div class="side-panel" id="panel"></div>

<div class="keyboard" id="keyboard">

<button onclick="APP.add('1')">1</button>
<button onclick="APP.add('2')">2</button>
<button onclick="APP.add('3')">3</button>

<button onclick="APP.add('4')">4</button>
<button onclick="APP.add('5')">5</button>
<button onclick="APP.add('6')">6</button>

<button onclick="APP.add('7')">7</button>
<button onclick="APP.add('8')">8</button>
<button onclick="APP.add('9')">9</button>

<button onclick="APP.add('с')">с</button>
<button onclick="APP.add('0')">0</button>
<button onclick="APP.clear()">⌫</button>

<button onclick="APP.add('sp')">sp</button>
<button onclick="APP.add('ts')">ts</button>

</div>

<script>

const APP = {
    keyboard: document.getElementById("keyboard"),
    panel: document.getElementById("panel"),
    input: document.getElementById("input"),
    result: document.getElementById("result"),

    showKeyboard(){
        this.keyboard.classList.remove("hide");
    },

    hideKeyboard(){
        this.keyboard.classList.add("hide");
    },

    showPanel(){
        this.panel.classList.add("show");
        this.hideKeyboard();
        renderSheet3();
    },

    hidePanel(){
        this.panel.classList.remove("show");
    },

    add(v){
        this.input.value += v;
        search();
    },

    clear(){
        this.input.value = "";
        this.result.innerHTML = "";
    }
};

/* DATA */
let data = [];
let data2 = [];

fetch("https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t="+Date.now())
.then(r=>r.text()).then(t=>{
    data=t.trim().split("\n").map(r=>{
        let c=r.split(",");
        return {station:c[0],material:c[1],article:c[2]};
    });
});

fetch("https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=421001458&t="+Date.now())
.then(r=>r.text()).then(t=>{
    data2=t.trim().split("\n").map(r=>r.split(","));
});

/* SEARCH */
function search(){

    let v=APP.input.value.toLowerCase();
    if(!v)return APP.result.innerHTML="";

    let res={};

    data.forEach(x=>{
        if(
            x.station?.toLowerCase().includes(v) ||
            x.material?.toLowerCase().includes(v) ||
            x.article?.toLowerCase().includes(v)
        ){
            if(!res[x.article])res[x.article]={};
            if(!res[x.article][x.material])res[x.article][x.material]=new Set();
            res[x.article][x.material].add(x.station);
        }
    });

    let html="";

    Object.keys(res).forEach(a=>{
        html+=`<div style="margin:10px;padding:10px;border:1px solid #ddd;border-radius:10px">
        <b>${a}</b>`;

        Object.keys(res[a]).forEach(m=>{
            html+=`<div>📦 ${m}
            <div style="font-size:12px;color:#777">
            ${[...res[a][m]].map(s=>`<div>🏭 ${s}</div>`).join("")}
            </div></div>`;
        });

        html+="</div>";
    });

    APP.result.innerHTML=html||"Не знайдено";
}

/* ARKUSH 3 */
function renderSheet3(){

    APP.panel.innerHTML=`
    <table>
        <thead>
            <tr>${data2[0].map(h=>`<th>${h}</th>`).join("")}</tr>
        </thead>
        <tbody>
            ${data2.slice(1).map(r=>`
                <tr>${r.map(c=>`<td>${c||""}</td>`).join("")}</tr>
            `).join("")}
        </tbody>
    </table>`;
}

/* SWIPE (ВІДЗЕРКАЛЕНО) */
let sx=0,sy=0,st=0;

document.addEventListener("touchstart",e=>{
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
    st=Date.now();
},{passive:true});

document.addEventListener("touchend",e=>{

    if(APP.keyboard.contains(e.target))return;

    let dx=e.changedTouches[0].clientX-sx;
    let dy=e.changedTouches[0].clientY-sy;
    let dt=Date.now()-st;

    let swipe=Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy);
    let tap=dt<250&&Math.abs(dx)<10&&Math.abs(dy)<10;

    if(swipe){

        /* 🔄 ВІДЗЕРКАЛЕНО */
        if(dx>0){
            APP.showPanel();   // 👈 тепер вправо = Аркуш3
        }else{
            APP.hidePanel();   // 👉 вліво = назад
            APP.showKeyboard();
        }

        return;
    }

    if(tap){
        if(APP.keyboard.classList.contains("hide"))
            APP.showKeyboard();
        else
            APP.hideKeyboard();
    }

},{passive:true});

/* SCROLL */
window.addEventListener("scroll",()=>APP.hideKeyboard());

</script>

</body>
</html>
