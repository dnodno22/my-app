<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
    touch-action: pan-y;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    padding: 16px;
    padding-bottom: 220px;
}

input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;
}

.result {
    font-size: 18px;
    line-height: 1.6;
}

/* ================= KEYBOARD FIX ================= */

.keyboard {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;

    width: 100%;
    max-width: 420px;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    padding: 14px;

    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(10px);

    border-top: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 -8px 20px rgba(0,0,0,0.08);

    border-top-left-radius: 18px;
    border-top-right-radius: 18px;

    transition: transform 0.25s ease, opacity 0.25s ease;

    z-index: 10;
}

.keyboard.hide {
    transform: translateX(-50%) translateY(120%);
    opacity: 0;
}

/* кнопки тепер однакові */
button {
  background: #fff;
  border: 1px solid #222;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  padding: 14px 0;
}

button:active {
  transform: scale(0.96);
}

/* ================= PANEL ================= */

.side-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    max-width: 420px;
    height: 100%;
    background: #fff;
    z-index: 20;
    overflow: auto;
    transition: right 0.25s ease;
    padding: 10px;
}

.side-panel.show {
    right: 0;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td {
    border: 1px solid #ddd;
    padding: 6px;
    font-size: 13px;
}

</style>
</head>

<body>

<div class="container">

<input id="input" readonly>
<div id="result"></div>

</div>

<div class="side-panel" id="panel"></div>

<div class="keyboard" id="keyboard">

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>

<button onclick="add('с')">с</button>
<button onclick="add('0')">0</button>
<button onclick="clearAll()">⌫</button>

<button onclick="add('sp')">sp</button>
<button onclick="add('ts')">ts</button>

</div>

<script>

/* ================= DATA ================= */

const url1 = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + Date.now();
const url2 = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=421001458&t=" + Date.now();

let data = [];
let data2 = [];

fetch(url1).then(r=>r.text()).then(t=>{
    data = t.trim().split("\n").map(r=>{
        let c = r.split(",");
        return {station:c[0],material:c[1],article:c[2]};
    });
});

fetch(url2).then(r=>r.text()).then(t=>{
    data2 = t.trim().split("\n").map(r=>r.split(","));
});

/* ================= UI ================= */

const k = document.getElementById("keyboard");
const input = document.getElementById("input");
const panel = document.getElementById("panel");

function add(v){
    input.value += v;
}

function clearAll(){
    input.value="";
}

/* ================= KEYBOARD ================= */

function showKeyboard(){
    if(panel.classList.contains("show")) return;
    k.classList.remove("hide");
}

function hideKeyboard(){
    k.classList.add("hide");
}

/* ================= PANEL ================= */

function showSheet2(){

    let html="<table>";

    data2.forEach(r=>{
        html+="<tr>";
        r.forEach(c=>{
            html+=`<td>${c||""}</td>`;
        });
        html+="</tr>";
    });

    html+="</table>";

    panel.innerHTML=html;
    panel.classList.add("show");
    hideKeyboard();
}

function hidePanel(){
    panel.classList.remove("show");
}

/* ================= TAP ================= */

let tapStart=0;

document.addEventListener("touchstart",e=>{
    if(k.contains(e.target)||panel.contains(e.target)) return;
    tapStart=Date.now();
});

document.addEventListener("touchend",e=>{
    let dt=Date.now()-tapStart;

    if(dt<180){
        if(k.classList.contains("hide")){
            showKeyboard();
        } else {
            hideKeyboard();
        }
    }
});

/* ================= SCROLL ================= */

window.addEventListener("scroll",()=>{
    hideKeyboard();
});

/* ================= SWIPE FIXED ================= */

let sx=0;
let sy=0;

document.addEventListener("touchstart",e=>{
    if(k.contains(e.target)||panel.contains(e.target)) return;
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
    if(k.contains(e.target)||panel.contains(e.target)) return;

    let dx=e.changedTouches[0].clientX-sx;
    let dy=Math.abs(e.changedTouches[0].clientY-sy);

    if(dy>50) return;

    if(dx<-80){
        showSheet2();   // 👈 вліво
    }

    if(dx>80){
        hidePanel();    // 👉 вправо
        showKeyboard();
    }
});

</script>

</body>
</html>
