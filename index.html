<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Пошук</title>

<style>
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
}

/* KEYBOARD */
.top-bar {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: #fff;
    padding: 12px;
    border-bottom: 1px solid #e5e7eb;
    transition: transform 0.35s ease;
    z-index: 10;

    /* важливо */
    --kb-height: 180px;
}

/* hidden keyboard */
.top-bar.hidden {
    transform: translateX(-50%) translateY(-100%);
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 10px;
    background: #fafafa;
    outline: none;
}

/* keyboard grid */
.keyboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}

button {
    padding: 14px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #e9ecef;
    font-weight: 600;
}

button:active {
    transform: scale(0.96);
    background: #dfe3e8;
}

/* RESULTS */
.result {
    flex: 1;
    overflow-y: auto;
    padding: 20px;

    /* 👇 ключове: завжди враховує клавіатуру */
    padding-top: calc(var(--kb-height) + 20px);
    transition: padding-top 0.35s ease;
}
</style>
</head>

<body>

<div class="container">

<div id="topBar" class="top-bar">

    <input id="input" readonly>

    <div class="keyboard">
        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>

        <div></div>
        <button onclick="add('0')">0</button>
        <button onclick="clearAll()">⌫</button>

        <button onclick="add('sp')">sp</button>
        <button onclick="add('ts')">ts</button>
    </div>

</div>

<div id="result" class="result"></div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + Date.now();

let data = [];

fetch(url)
.then(res => res.text())
.then(text => {

    let rows = text.trim().split("\n");

    data = rows.map(r => {
        let c = r.split(",");
        return {
            station: c[0] || "",
            material: c[1] || "",
            article: c[2] || ""
        };
    });
});

function add(val){
    document.getElementById("input").value += val;
    search();
}

function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("result").innerHTML = "";
}

function search(){

    let val = document.getElementById("input").value.toLowerCase();

    if(val === ""){
        document.getElementById("result").innerHTML = "";
        return;
    }

    let res = data.filter(x =>
        (x.station && x.station.toLowerCase().includes(val)) ||
        (x.material && x.material.toLowerCase().includes(val)) ||
        (x.article && x.article.toLowerCase().includes(val))
    );

    document.getElementById("result").innerHTML =
        res.length
        ? res.map(r => `
            <b>Станція:</b> ${r.station}<br>
            <b>Матеріал:</b> ${r.material}<br>
            <b>Артикул:</b> ${r.article}
            <hr>
        `).join("")
        : "Не знайдено";
}

/* SCROLL BEHAVIOR */
const result = document.getElementById("result");
const topBar = document.getElementById("topBar");

let lastScroll = 0;

result.addEventListener("scroll", () => {

    let current = result.scrollTop;

    if(current > lastScroll + 5){
        topBar.classList.add("hidden");

        // клавіатура схована → висота = 0
        document.documentElement.style.setProperty('--kb-height', '0px');
    }

    if(current < lastScroll - 5){
        topBar.classList.remove("hidden");

        // клавіатура показана → повертаємо висоту
        document.documentElement.style.setProperty('--kb-height', '180px');
    }

    lastScroll = current;
});

</script>

</body>
</html>
