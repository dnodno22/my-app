<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
}

/* КОНТЕЙНЕР */
.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-bottom: 220px;
}

/* INPUT */
input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;

    position: sticky;
    top: 0;
    z-index: 10;
}

/* RESULT */
.result {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

/* KEYBOARD (твій дизайн) */
.keyboard {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;

    width: 100%;
    max-width: 420px;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    padding: 14px;

    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);

    border-top: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 -8px 20px rgba(0,0,0,0.06);

    border-top-left-radius: 18px;
    border-top-right-radius: 18px;

    transition: transform 0.25s ease, opacity 0.25s ease;
}

.keyboard.hide {
    transform: translateX(-50%) translateY(120%);
    opacity: 0;
}

/* BUTTON */
.button-23 {
  background-color: #FFFFFF;
  border: 1px solid #222222;
  border-radius: 8px;
  color: #222;
  font-size: 16px;
  font-weight: 600;
  padding: 14px 0;
  cursor: pointer;
}

.button-23:active {
  transform: scale(0.96);
  background-color: #F7F7F7;
}

/* PANEL */
.side-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    max-width: 420px;
    height: 100%;
    background: #fff;
    z-index: 20;
    padding: 10px;
    overflow: auto;
    transition: right 0.3s ease;
}

.side-panel.show {
    right: 0;
}

</style>
</head>

<body>

<div class="container">
    <input id="input" readonly>
    <div id="result" class="result"></div>
</div>

<div class="side-panel" id="panel"></div>

<!-- 🔥 ТВОЯ КЛАВІАТУРА (UI НЕ ЗМІНЕНИЙ) -->
<div class="keyboard" id="keyboard">

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>

<button onclick="add('с')">с</button>
<button onclick="add('0')">0</button>
<button onclick="clearAll()">⌫</button>

<button onclick="add('sp')">sp</button>
<button onclick="add('ts')">ts</button>

</div>

<script>

const input = document.getElementById("input");
const result = document.getElementById("result");
const keyboard = document.getElementById("keyboard");
const panel = document.getElementById("panel");

/* =========================
   KEYBOARD LOGIC (НОВА)
========================= */

function add(v){
    input.value += v;
    search();
}

function clearAll(){
    input.value = "";
    result.innerHTML = "";
}

/* TAP toggle */
let lastTap = 0;

document.addEventListener("touchend", (e) => {

    const now = Date.now();
    const isDouble = now - lastTap < 300;
    lastTap = now;

    if (keyboard.contains(e.target)) return;

    if (isDouble) return;

    // toggle keyboard
    keyboard.classList.toggle("hide");
});

/* scroll always hide */
window.addEventListener("scroll", () => {
    keyboard.classList.add("hide");
});

/* =========================
   SWIPE (АРКУШ3)
========================= */

let sx = 0;

document.addEventListener("touchstart", e => {
    sx = e.touches[0].clientX;
}, {passive:true});

document.addEventListener("touchend", e => {

    if (keyboard.contains(e.target)) return;

    let dx = e.changedTouches[0].clientX - sx;

    if (dx > 80) {
        panel.classList.add("show");
        keyboard.classList.add("hide");
    }

    if (dx < -80) {
        panel.classList.remove("show");
    }
});

/* =========================
   SEARCH (твоя логіка)
========================= */

let data = [];

fetch("https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t="+Date.now())
.then(r=>r.text())
.then(t=>{
    data = t.trim().split("\n").map(r=>{
        let c = r.split(",");
        return {
            station: c[0] || "",
            material: c[1] || "",
            article: c[2] || ""
        };
    });
});

function search(){

    let v = input.value.toLowerCase();
    if(!v) return result.innerHTML = "";

    const res = {};

    data.forEach(x=>{
        if(
            x.station?.toLowerCase().includes(v) ||
            x.material?.toLowerCase().includes(v) ||
            x.article?.toLowerCase().includes(v)
        ){
            if(!res[x.article]) res[x.article]={};
            if(!res[x.article][x.material]) res[x.article][x.material]=new Set();
            res[x.article][x.material].add(x.station);
        }
    });

    let html = "";

    Object.keys(res).forEach(a=>{
        html += `<div style="margin:10px;padding:10px;border:1px solid #ddd;border-radius:10px">
        <b>${a}</b>`;

        Object.keys(res[a]).forEach(m=>{
            html += `<div>📦 ${m}
            <div style="font-size:12px;color:#777">
            ${[...res[a][m]].map(s=>`<div>🏭 ${s}</div>`).join("")}
            </div></div>`;
        });

        html += `</div>`;
    });

    result.innerHTML = html || "Не знайдено";
}

</script>

</body>
</html>
