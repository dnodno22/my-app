<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пошук додаток</title>

<style>
body {
    font-family: Arial;
    background:#f2f2f2;
    padding:20px;
}

.container {
    background:white;
    padding:20px;
    border-radius:10px;
}

input {
    width:100%;
    padding:15px;
    font-size:20px;
    margin-bottom:10px;
    text-align:center;
    box-sizing:border-box;
}

.keyboard {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

button {
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
}

.result {
    margin-top:15px;
    font-size:18px;
    line-height:1.5;
}
</style>

</head>
body {
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
    padding:0;
}

.container {
    background:white;
    padding:15px;
    border-radius:0;
}

<input id="input" placeholder="Введи код" readonly>

<div class="keyboard">

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>

<div></div>
<button onclick="add('0')">0</button>
<button onclick="clearAll()">⌫</button>

<button onclick="add('sp')">sp</button>
<button onclick="add('ts')">ts</button>

</div>

</div>

<div id="result" class="result"></div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + new Date().getTime();

let data = [];

fetch(url)
.then(res => res.text())
.then(text => {

    let rows = text.trim().split("\n");

    data = rows.map(r => {
        let c = r.split(",");
        return {
            station: c[0] || "",
            material: c[1] || "",
            article: c[2] || ""
        };
    });
});

function add(val){
    let input = document.getElementById("input");
    input.value += val;
    search();
}

function clearInput(){
    document.getElementById("input").value = "";
    document.getElementById("result").innerHTML = "";
    
}
function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("result").innerHTML = "";
}
function search(){

    let val = document.getElementById("input").value.toLowerCase();

    if(val === ""){
        document.getElementById("result").innerHTML = "";
        return;
    }

    let res = data.filter(x =>
        x.station.toLowerCase().includes(val) ||
        x.material.toLowerCase().includes(val) ||
        x.article.toLowerCase().includes(val)
    );

    if(res.length > 0){

        let out = "";

        res.forEach(r => {
            out += `
            <b>Станція:</b> ${r.station}<br>
            <b>Матеріал:</b> ${r.material}<br>
            <b>Артикул:</b> ${r.article}
            <hr>
            `;
        });

        document.getElementById("result").innerHTML = out;

    } else {
        document.getElementById("result").innerHTML = "Не знайдено";
    }
}

</script>

</body>
</html>
