<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
}

/* КОНТЕЙНЕР */
.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-bottom: 220px;
}

/* INPUT */
input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;

    position: sticky;
    top: 0;
    z-index: 10;
}

/* RESULT */
.result {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

/* KEYBOARD */
.keyboard {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;

    width: 100%;
    max-width: 420px;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    padding: 14px;

    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border-top: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 -8px 20px rgba(0,0,0,0.06);

    border-top-left-radius: 18px;
    border-top-right-radius: 18px;

    transition: transform 0.25s ease, opacity 0.25s ease;
}

/* HIDE STATE */
.keyboard.hide {
    transform: translateX(-50%) translateY(120%);
    opacity: 0;
}

/* BUTTON */
.button-23 {
  background-color: #FFFFFF;
  border: 1px solid #222222;
  border-radius: 8px;
  color: #222;
  font-size: 16px;
  font-weight: 600;

  padding: 14px 0;

  cursor: pointer;
  transition: transform .1s ease;
}

.button-23:active {
  transform: scale(0.96);
  background-color: #F7F7F7;
}

hr {
    border: none;
    border-top: 1px solid #eee;
    margin: 10px 0;
}

</style>
</head>

<body>

<div class="container">

<input id="input" readonly>

<div id="result" class="result"></div>

</div>

<!-- KEYBOARD -->
<div class="keyboard" id="keyboard">

<button class="button-23" onclick="add('1')">1</button>
<button class="button-23" onclick="add('2')">2</button>
<button class="button-23" onclick="add('3')">3</button>

<button class="button-23" onclick="add('4')">4</button>
<button class="button-23" onclick="add('5')">5</button>
<button class="button-23" onclick="add('6')">6</button>

<button class="button-23" onclick="add('7')">7</button>
<button class="button-23" onclick="add('8')">8</button>
<button class="button-23" onclick="add('9')">9</button>

<button class="button-23" onclick="add('0')">0</button>
<button class="button-23" onclick="add('с')">с</button>
<button class="button-23" onclick="clearAll()">⌫</button>

<button class="button-23" onclick="add('sp')">sp</button>
<button class="button-23" onclick="add('ts')">ts</button>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + new Date().getTime();

let data = [];

fetch(url)
.then(res => res.text())
.then(text => {

    let rows = text.trim().split("\n");

    data = rows.map(r => {
        let c = r.split(",");
        return {
            station: c[0] || "",
            material: c[1] || "",
            article: c[2] || ""
        };
    });
});

function add(val){
    document.getElementById("input").value += val;
    search();
}

function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("result").innerHTML = "";
}

function search(){

    let val = document.getElementById("input").value.toLowerCase();

    if(val === ""){
        document.getElementById("result").innerHTML = "";
        return;
    }

    let res = data.filter(x =>
        (x.station && x.station.toLowerCase().includes(val)) ||
        (x.material && x.material.toLowerCase().includes(val)) ||
        (x.article && x.article.toLowerCase().includes(val))
    );

    document.getElementById("result").innerHTML = res.length
        ? res.map(r => `
            <b>Станція:</b> ${r.station}<br>
            <b>Матеріал:</b> ${r.material}<br>
            <b>Артикул:</b> ${r.article}
            <hr>
        `).join("")
        : "Не знайдено";
}

/* 🔥 SMART SCROLL KEYBOARD */
const keyboard = document.getElementById("keyboard");

let lastScroll = 0;
let lastTime = Date.now();

window.addEventListener("scroll", () => {

    let current = window.scrollY;
    let now = Date.now();

    let deltaY = current - lastScroll;
    let deltaT = now - lastTime;

    let speed = Math.abs(deltaY / deltaT);

    // вниз → завжди ховаємо
    if (deltaY > 0) {
        keyboard.classList.add("hide");
    }

    // вверх → тільки швидкий рух
    if (deltaY < 0 && speed > 0.8) {
        keyboard.classList.remove("hide");
    }

    lastScroll = current;
    lastTime = now;
});

</script>

</body>
</html>
