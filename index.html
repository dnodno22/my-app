<script>

// 🔥 Аркуш1
const url = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + new Date().getTime();

let data = [];

fetch(url)
.then(r => r.text())
.then(t => {
    data = t.trim().split("\n").map(r => {
        let c = r.split(",");
        return {
            station: c[0] || "",
            material: c[1] || "",
            article: c[2] || ""
        };
    });
});

// 🔥 Аркуш3
const url2 = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=421001458&t=" + new Date().getTime();

let data2 = [];

fetch(url2)
.then(r => r.text())
.then(t => {
    data2 = t.trim().split("\n").map(r => r.split(","));
});

function add(v){
    document.getElementById("input").value += v;
    search();
}

function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("result").innerHTML = "";
}

function search(){
    let v = document.getElementById("input").value.toLowerCase();
    if(!v) return document.getElementById("result").innerHTML = "";

    let res = data.filter(x =>
        (x.station && x.station.toLowerCase().includes(v)) ||
        (x.material && x.material.toLowerCase().includes(v)) ||
        (x.article && x.article.toLowerCase().includes(v))
    );

    document.getElementById("result").innerHTML =
        res.length ? res.map(r => `
            <b>Станція:</b> ${r.station}<br>
            <b>Матеріал:</b> ${r.material}<br>
            <b>Артикул:</b> ${r.article}
            <hr>
        `).join("") : "Не знайдено";
}


// 🔥 PANEL (НОВА ЛОГІКА ГРУПУВАННЯ)
function showPanel(){

    const panel = document.getElementById("panel");

    // будуємо структуру: article -> material -> stations
    let grouped = {};

    for(let i=1;i<data2.length;i++){
        let row = data2[i];
        let station = row[0] || "";
        let material = row[1] || "";
        let article = row[2] || "";

        if(!grouped[article]) grouped[article] = {};
        if(!grouped[article][material]) grouped[article][material] = [];
        grouped[article][material].push(station);
    }

    let html = "";

    let articles = Object.keys(grouped).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));

    for(let art of articles){

        html += `<div style="background:#f1f5f9;padding:8px;margin-top:10px;font-weight:bold;">
                    Артикул: ${art}
                 </div>`;

        let materials = Object.keys(grouped[art]).sort();

        for(let mat of materials){

            html += `<div style="padding:6px 8px;font-weight:600;">
                        Матеріал: ${mat}
                     </div>`;

            for(let st of grouped[art][mat]){

                html += `<div style="padding-left:14px;border-bottom:1px solid #eee;padding-bottom:4px;">
                            Станція: ${st}
                         </div>`;
            }
        }
    }

    panel.innerHTML = html;
    panel.classList.add("show");
}

function hidePanel(){
    document.getElementById("panel").classList.remove("show");
}

// SWIPE
let sx=0;
document.addEventListener("touchstart",e=>sx=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
    let dx = sx - e.changedTouches[0].clientX;
    if(dx>80) showPanel();
    if(dx<-80) hidePanel();
});

// KEYBOARD SCROLL
const k = document.getElementById("keyboard");
let last=0, t=Date.now();

window.addEventListener("scroll",()=>{
    let y=window.scrollY;
    let now=Date.now();
    let sp=Math.abs((y-last)/(now-t));

    if(y-last>0) k.classList.add("hide");
    if(y-last<0 && sp>0.8) k.classList.remove("hide");

    last=y;t=now;
});

</script>
