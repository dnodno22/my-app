<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-bottom: 220px;
}

input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;
}

.result {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
}

/* PANEL */
.side-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    max-width: 420px;
    height: 100%;
    background: #fff;
    z-index: 20;
    padding: 10px;
    overflow: auto;
    transition: right 0.3s ease;
}

.side-panel.show {
    right: 0;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th {
    background: #f1f5f9;
    border: 1px solid #ddd;
    padding: 8px;
    cursor: pointer;
    position: sticky;
    top: 0;
}

td {
    border: 1px solid #ddd;
    padding: 6px;
}

/* KEYBOARD */
.keyboard {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;

    width: 100%;
    max-width: 420px;

    display: grid;

    grid-template-columns: repeat(3, 1fr);
    grid-template-areas:
        "tab2 tab2 tab2"
        "b1 b2 b3"
        "b4 b5 b6"
        "b7 b8 b9"
        "bC b0 bDel"
        "bSp bTs .";

    gap: 10px;

    padding: 14px;

    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);

    border-top: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 -8px 20px rgba(0,0,0,0.06);

    border-top-left-radius: 18px;
    border-top-right-radius: 18px;
}

.button-23 {
  background-color: #FFFFFF;
  border: 1px solid #222222;
  border-radius: 8px;
  color: #222;
  font-size: 16px;
  font-weight: 600;
  padding: 14px 0;
  cursor: pointer;
}

.button-23:active {
  transform: scale(0.96);
  background-color: #F7F7F7;
}

</style>
</head>

<body>

<div class="container">

<input id="input" readonly>

<div id="result" class="result"></div>

</div>

<div class="side-panel" id="panel"></div>

<div class="keyboard" id="keyboard">

<!-- TAB 2 (завжди над 3) -->
<button class="button-23" style="grid-area: tab2;" onclick="openSheet2()">
Таб 2
</button>

<button class="button-23" style="grid-area: b1;" onclick="add('1')">1</button>
<button class="button-23" style="grid-area: b2;" onclick="add('2')">2</button>
<button class="button-23" style="grid-area: b3;" onclick="add('3')">3</button>

<button class="button-23" style="grid-area: b4;" onclick="add('4')">4</button>
<button class="button-23" style="grid-area: b5;" onclick="add('5')">5</button>
<button class="button-23" style="grid-area: b6;" onclick="add('6')">6</button>

<button class="button-23" style="grid-area: b7;" onclick="add('7')">7</button>
<button class="button-23" style="grid-area: b8;" onclick="add('8')">8</button>
<button class="button-23" style="grid-area: b9;" onclick="add('9')">9</button>

<button class="button-23" style="grid-area: bC;" onclick="add('с')">с</button>
<button class="button-23" style="grid-area: b0;" onclick="add('0')">0</button>
<button class="button-23" style="grid-area: bDel;" onclick="clearAll()">⌫</button>

<button class="button-23" style="grid-area: bSp;" onclick="add('sp')">sp</button>
<button class="button-23" style="grid-area: bTs;" onclick="add('ts')">ts</button>

</div>

<script>

const input = document.getElementById("input");
const resultBox = document.getElementById("result");
const panel = document.getElementById("panel");

/* ================= SEARCH ================= */

let data = [];

const url = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + Date.now();

fetch(url)
.then(r => r.text())
.then(t => {
    data = t.trim().split("\n").map(r => {
        let c = r.split(",");
        return {
            station: c[0] || "",
            material: c[1] || "",
            article: c[2] || ""
        };
    });
});

function add(v){
    input.value += v;
    search();
}

function clearAll(){
    input.value = "";
    resultBox.innerHTML = "";
}

function search(){

    let v = input.value.toLowerCase();
    if(!v) return resultBox.innerHTML = "";

    const isNumber = /^\d+$/.test(v);

    const result = {};

    data.forEach(x => {

        const match =
            (x.station && (isNumber ? x.station.toLowerCase().endsWith(v) : x.station.toLowerCase().includes(v))) ||
            (x.material && (isNumber ? x.material.toLowerCase().endsWith(v) : x.material.toLowerCase().includes(v))) ||
            (x.article && (isNumber ? x.article.toLowerCase().endsWith(v) : x.article.toLowerCase().includes(v)));

        if (match) {

            if (!result[x.article]) result[x.article] = {};
            if (!result[x.article][x.material]) result[x.article][x.material] = new Set();

            result[x.article][x.material].add(x.station);
        }
    });

    let html = "";

    Object.keys(result).forEach(article => {

        html += `
        <div style="margin-bottom:15px;padding:12px;border:1px solid #e5e7eb;border-radius:14px;background:#fafafa;">
        <div style="font-weight:bold;font-size:20px;">${article}</div>
        `;

        Object.keys(result[article]).forEach(material => {

            html += `
            <div style="margin-left:8px;">
                <div>📦 ${material}</div>
                <div style="font-size:13px;color:#888;padding-left:10px;">
                    ${[...result[article][material]].map(s=>`<div>${s}</div>`).join("")}
                </div>
            </div>`;
        });

        html += `</div>`;
    });

    resultBox.innerHTML = html || "Не знайдено";
}

/* ================= PANEL ================= */

function showPanel(){ panel.classList.add("show"); }
function hidePanel(){ panel.classList.remove("show"); }

/* ================= SHEET 2 ================= */

let data2 = [];
let sortDir = {};

function openSheet2(){
    showPanel();
    panel.innerHTML = "Завантаження...";

    const url2 = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=421001458&t=" + Date.now();

    fetch(url2)
    .then(r => r.text())
    .then(t => {
        data2 = t.trim().split("\n").map(r => r.split(","));
        renderTable(data2);
    });
}

function renderTable(arr){

    let html = `<table><thead><tr>`;

    arr[0].forEach((h,i)=>{
        html += `<th onclick="sortTable(${i})">${h}</th>`;
    });

    html += `</tr></thead><tbody>`;

    arr.slice(1).forEach(r=>{
        html += `<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`;
    });

    html += `</tbody></table>`;

    panel.innerHTML = html;
}

function sortTable(col){

    sortDir[col] = !sortDir[col];

    const sorted = [...data2.slice(1)].sort((a,b)=>{
        let A = a[col] || "";
        let B = b[col] || "";

        if (!isNaN(A) && !isNaN(B))
            return sortDir[col] ? A-B : B-A;

        return sortDir[col]
            ? A.localeCompare(B)
            : B.localeCompare(A);
    });

    renderTable([data2[0], ...sorted]);
}

</script>

</body>
</html>
