<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Пошук</title>
<style>
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: -apple-system, Arial, sans-serif;
    background: #fff; touch-action: none;
}

#pages { display: flex; width: 200%; height: 100%; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
.page { width: 50%; height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* SEARCH PAGE */
.search-header { padding: 16px 16px 8px; padding-top: calc(16px + env(safe-area-inset-top)); flex-shrink: 0; }
input#input {
    width: 100%; padding: 16px 18px; font-size: 22px; border-radius: 14px;
    border: 1px solid #e5e7eb; text-align: center; outline: none;
    background: #f9fafb; color: #111; caret-color: transparent; height: 60px;
}

.scroll-area { flex: 1; overflow-y: auto; padding: 8px 16px 16px; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.result-card { margin-bottom: 12px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 14px; background: #fafafa; }
.result-article { font-weight: 700; font-size: 20px; color: #111; margin-bottom: 6px; }
.result-material-name { font-size: 15px; color: #666; margin-bottom: 4px; display: flex; justify-content: space-between; }
.result-address { color: #059669; font-weight: 600; font-size: 14px; } /* Стиль для адреси з колонки E */
.result-stations { font-size: 24px; font-weight: 800; color: #000; }

/* KEYBOARDS */
.kb-container {
    flex-shrink: 0; background: #fff; border-top: 1px solid #e5e7eb;
    padding: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom));
}
.kb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.hidden { display: none !important; }

.btn {
    background: #fff; border: 1px solid #222; border-radius: 8px;
    color: #222; font-size: 18px; font-weight: 600; padding: 15px 0;
    text-align: center; touch-action: manipulation; user-select: none;
}
.btn:active { background: #F7F7F7; transform: scale(.96); }
.btn-special { background: #f1f5f9; }

/* TABLE PAGE */
#page2 { background: #fff; }
.table-header { padding: 16px; padding-top: calc(16px + env(safe-area-inset-top)); border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
.table-scroll { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
table { border-collapse: collapse; font-size: 13px; min-width: 100%; }
th { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 12px 8px; position: sticky; top: 0; text-align: left; font-weight: 700; color: #333; }
td { border: 1px solid #e2e8f0; padding: 8px; white-space: nowrap; color: #444; }
tr:nth-child(even) td { background: #f9fafb; }

.page-dots { position: fixed; bottom: calc(8px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); display: flex; gap: 6px; pointer-events: none; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #d1d5db; }
.dot.active { background: #374151; transform: scale(1.3); }
</style>
</head>
<body>

<div id="pages">
    <!-- PAGE 1 -->
    <div class="page" id="page1">
        <div class="search-header"><input id="input" readonly></div>
        <div class="scroll-area"><div id="result"></div></div>
        <div id="kb-wrapper" class="kb-container">
            <div id="kb1" class="kb-grid">
                <button class="btn" data-v="1">1</button>
                <button class="btn" data-v="2">2</button>
                <button class="btn" data-v="3">3</button>
                <button class="btn" data-v="4">4</button>
                <button class="btn" data-v="5">5</button>
                <button class="btn" data-v="6">6</button>
                <button class="btn" data-v="7">7</button>
                <button class="btn" data-v="8">8</button>
                <button class="btn" data-v="9">9</button>
                <button class="btn" data-v="с">с</button>
                <button class="btn" data-v="0">0</button>
                <button class="btn btn-special" data-del="all">⌫</button>
                <button class="btn" data-v="sp">sp</button>
                <button class="btn" data-v="ts">ts</button>
                <button class="btn btn-special" id="btn-to-kb2">⌨️</button>
            </div>
            <div id="kb2" class="kb-grid hidden">
                <button class="btn" data-v="стр">стр</button>
                <div></div><div></div><div></div><div></div>
                <button class="btn btn-special" id="btn-to-kb1">назад</button>
            </div>
        </div>
    </div>

    <!-- PAGE 2 -->
    <div class="page" id="page2">
        <div class="table-header"><span class="table-title">Повна таблиця</span></div>
        <div class="table-scroll" id="table-scroll">
            <div id="table-content"><div style="text-align:center; padding:40px; color:#999;">⏳ Завантаження...</div></div>
        </div>
    </div>
</div>

<div class="page-dots">
    <div class="dot active" id="dot0"></div>
    <div class="dot" id="dot1"></div>
</div>

<script>
let currentPage = 0;
let searchData = [];
let fullTableData = [];
let tableHeaders = [];
let sortCol = -1;
let sortAsc = true;

const input = document.getElementById('input');
const resultBox = document.getElementById('result');
const kbWrapper = document.getElementById('kb-wrapper');
const tableContent = document.getElementById('table-content');

// Клавіатура
document.getElementById('btn-to-kb2').onclick = (e) => { e.stopPropagation(); document.getElementById('kb1').classList.add('hidden'); document.getElementById('kb2').classList.remove('hidden'); };
document.getElementById('btn-to-kb1').onclick = (e) => { e.stopPropagation(); document.getElementById('kb2').classList.add('hidden'); document.getElementById('kb1').classList.remove('hidden'); };

document.querySelectorAll('.btn').forEach(btn => {
    if (btn.id.startsWith('btn-to')) return;
    btn.onclick = (e) => {
        e.stopPropagation();
        if (btn.dataset.del) { input.value = ""; } 
        else { input.value += btn.dataset.v; }
        search();
    };
});

// Дані для Пошуку
const url1 = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t=" + Date.now();
fetch(url1).then(r => r.text()).then(t => {
    searchData = t.trim().split("\n").map(r => {
        const c = r.split(",");
        return { 
            station: c[0]||"", 
            material: c[1]||"", 
            article: c[2]||"", 
            colD: c[3]||"",
            address: c[4]||"" // Колонка E (індекс 4)
        };
    });
});

function search() {
    const v = input.value.toLowerCase();
    if (!v) { resultBox.innerHTML = ""; return; }
    const isNumOnly = /^\d+$/.test(v);
    const isStrSearch = v.includes("стр");

    const filtered = searchData.filter(x => {
        if (isStrSearch) return x.colD.toLowerCase().startsWith(v);
        if (isNumOnly) return x.station.toLowerCase().endsWith(v) || x.material.toLowerCase().endsWith(v) || x.article.toLowerCase().endsWith(v);
        return x.station.toLowerCase().startsWith(v) || x.material.toLowerCase().startsWith(v) || x.article.toLowerCase().startsWith(v);
    });

    if (!filtered.length) { resultBox.innerHTML = '<div style="text-align:center; padding:40px; color:#aaa;">Не знайдено</div>'; return; }

    // Групуємо, зберігаючи адресу разом з назвою матеріалу
    const grouped = {};
    filtered.forEach(x => {
        if (!grouped[x.article]) grouped[x.article] = {};
        const matKey = x.material + "|" + x.address; // Створюємо ключ назва+адреса
        if (!grouped[x.article][matKey]) grouped[x.article][matKey] = new Set();
        grouped[x.article][matKey].add(x.station);
    });

    let html = "";
    for (let art in grouped) {
        html += `<div class="result-card"><div class="result-article">${art}</div>`;
        for (let matKey in grouped[art]) {
            const [matName, matAddr] = matKey.split("|");
            html += `<div style="margin-bottom:8px;">
                <div class="result-material-name">
                    <span>📦 ${matName}</span>
                    <span class="result-address">${matAddr}</span>
                </div>
                <div class="result-stations">${[...grouped[art][matKey]].join(" | ")}</div>
            </div>`;
        }
        html += `</div>`;
    }
    resultBox.innerHTML = html;
}

// ПОВНА ТАБЛИЦЯ ТА СОРТУВАННЯ (без змін)
function loadTable() {
    if (fullTableData.length > 0) return;
    const url2 = "https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=421001458&t=" + Date.now();
    fetch(url2).then(r => r.text()).then(t => {
        const lines = t.trim().split("\n").map(l => l.split(","));
        tableHeaders = lines[0];
        fullTableData = lines.slice(1);
        renderTable();
    });
}

function renderTable() {
    let data = [...fullTableData];
    if (sortCol >= 0) {
        data.sort((a, b) => {
            let v1 = a[sortCol] || "", v2 = b[sortCol] || "";
            let n1 = parseFloat(v1), n2 = parseFloat(v2);
            if (!isNaN(n1) && !isNaN(n2)) return sortAsc ? n1 - n2 : n2 - n1;
            return sortAsc ? v1.localeCompare(v2, 'uk') : v2.localeCompare(v1, 'uk');
        });
    }
    let h = '<table><thead><tr>';
    tableHeaders.forEach((name, i) => {
        h += `<th onclick="doSort(${i})">${name}${sortCol === i ? (sortAsc ? ' ↑' : ' ↓') : ''}</th>`;
    });
    h += '</tr></thead><tbody>';
    data.forEach(row => { h += '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>'; });
    tableContent.innerHTML = h + '</tbody></table>';
}

window.doSort = function(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    renderTable();
};

function goToPage(n) {
    currentPage = n;
    document.getElementById('pages').style.transform = `translateX(-${n * 50}%)`;
    document.getElementById('dot0').classList.toggle('active', n === 0);
    document.getElementById('dot1').classList.toggle('active', n === 1);
    if (n === 1) { kbWrapper.classList.add('hidden'); loadTable(); }
    else { kbWrapper.classList.remove('hidden'); }
}

let tx = 0, moved = false;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; moved = false; }, {passive:true});
document.addEventListener('touchmove', () => { moved = true; }, {passive:true});
document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (moved && Math.abs(dx) > 60) {
        if (dx < 0 && currentPage === 0) goToPage(1);
        if (dx > 0 && currentPage === 1) goToPage(0);
    } else if (!moved && currentPage === 0 && !kbWrapper.contains(e.target)) {
        kbWrapper.classList.toggle('hidden');
    }
}, {passive:true});
</script>
</body>
</html>
