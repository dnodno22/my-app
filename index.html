<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
    height: 100vh;
    overflow: hidden;
}

/* APP */
.container {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    margin: 0 auto;
    background: #fff;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-bottom: 260px; /* місце під клавіатуру */
}

/* INPUT */
input {
    width: 100%;
    padding: 16px;
    font-size: 20px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    outline: none;
    background: #fafafa;
}

/* RESULT */
.result {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 10px;
    font-size: 16px;
    line-height: 1.5;
    color: #333;
}

/* ITEM */
.item {
    background: #f8f9fa;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* KEYBOARD */
.keyboard {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);

    width: 100%;
    max-width: 420px;

    background: #ffffff;
    padding: 12px;
    padding-bottom: env(safe-area-inset-bottom);

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    border-top: 1px solid #e5e7eb;
}

/* BUTTON */
button {
    padding: 16px;
    font-size: 18px;
    border: none;
    border-radius: 14px;
    background: #e9ecef;
    font-weight: 600;
}

button:active {
    transform: scale(0.96);
    background: #dfe3e8;
}

</style>

</head>

<body>

<div class="container">

<input id="input" readonly>
<div id="result" class="result"></div>

</div>

<div class="keyboard">

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>

<button onclick="clearAll()">⌫</button>
<button onclick="add('0')">0</button>
<button onclick="add('sp')">sp</button>

</div>

<script>

function add(val){
    document.getElementById("input").value += val;
}

function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("result").innerHTML = "";
}

</script>

</body>
</html>
