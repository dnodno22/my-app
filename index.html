<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8">

<title>Пошук</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #f4f6f8;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-bottom: 220px;
}

input {
    width: 100%;
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    text-align: center;
    margin-bottom: 12px;
    background: #fafafa;
}

.result {
    font-size: 18px;
}

/* keyboard */
.keyboard {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
    width: 100%;
    max-width: 420px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 14px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(0,0,0,0.08);
    transition: 0.25s;
}

.keyboard.hide {
    transform: translateX(-50%) translateY(120%);
    opacity: 0;
}

.button-23 {
  border: 1px solid #222;
  border-radius: 10px;
  font-size: 18px;
  padding: 16px 0;
  background: #fff;
}

.button-23:active {
  transform: scale(0.95);
}

/* panel */
.side-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    max-width: 420px;
    height: 100%;
    background: #fff;
    z-index: 20;
    overflow: auto;
    transform: translateX(100%);
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th {
    position: sticky;
    top: 0;
    background: #f1f5f9;
    cursor: pointer;
}

td, th {
    border: 1px solid #ddd;
    padding: 6px;
}

</style>
</head>

<body>

<div class="container">
<input id="input" readonly>
<div id="result" class="result"></div>
</div>

<div class="side-panel" id="panel"></div>

<div class="keyboard" id="keyboard">

<button class="button-23" onclick="add('1')">1</button>
<button class="button-23" onclick="add('2')">2</button>
<button class="button-23" onclick="add('3')">3</button>

<button class="button-23" onclick="add('4')">4</button>
<button class="button-23" onclick="add('5')">5</button>
<button class="button-23" onclick="add('6')">6</button>

<button class="button-23" onclick="add('7')">7</button>
<button class="button-23" onclick="add('8')">8</button>
<button class="button-23" onclick="add('9')">9</button>

<button class="button-23" onclick="add('с')">с</button>
<button class="button-23" onclick="add('0')">0</button>
<button class="button-23" onclick="clearAll()">⌫</button>

<button class="button-23" onclick="add('sp')">sp</button>
<button class="button-23" onclick="add('ts')">ts</button>

</div>

<script>

const k = document.getElementById("keyboard");
const input = document.getElementById("input");
const resultBox = document.getElementById("result");
const panel = document.getElementById("panel");

/* keyboard */
function showKeyboard(){ if (!panel.classList.contains("show")) k.classList.remove("hide"); }
function hideKeyboard(){ k.classList.add("hide"); }

/* data */
let data = [];
let data2 = [];

fetch("https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=1679964111&t="+Date.now())
.then(r=>r.text()).then(t=>{
    data = t.trim().split("\n").map(r=>{
        let c=r.split(",");
        return {station:c[0]||"",material:c[1]||"",article:c[2]||""};
    });
});

fetch("https://docs.google.com/spreadsheets/d/1ii4oiQvbayKKN1tffS4X7WxH0NPZ0oiooaHPP6Ku6W8/export?format=csv&gid=421001458&t="+Date.now())
.then(r=>r.text()).then(t=>{
    data2 = t.trim().split("\n").map(r=>r.split(","));
});

/* search */
function add(v){ input.value+=v; search(); }
function clearAll(){ input.value=""; resultBox.innerHTML=""; }

function search(){
    let v=input.value.toLowerCase();
    if(!v) return resultBox.innerHTML="";

    const isNumber=/^\d+$/.test(v);
    const result={};

    data.forEach(x=>{
        const match =
        (x.station && (isNumber ? x.station.endsWith(v) : x.station.includes(v))) ||
        (x.material && (isNumber ? x.material.endsWith(v) : x.material.includes(v))) ||
        (x.article && (isNumber ? x.article.endsWith(v) : x.article.includes(v)));

        if(match){
            if(!result[x.article]) result[x.article]={};
            if(!result[x.article][x.material]) result[x.article][x.material]=new Set();
            result[x.article][x.material].add(x.station);
        }
    });

    let html="";
    Object.keys(result).forEach(a=>{
        html+=`<div><b>${a}</b>`;
        Object.keys(result[a]).forEach(m=>{
            html+=`<div>📦 ${m} ${[...result[a][m]].join(", ")}</div>`;
        });
        html+="</div><br>";
    });

    resultBox.innerHTML = html || "Не знайдено";
}

/* sort */
let sortColumn=0, sortAsc=true;

function renderSheet3(){

    if(!data2.length){
        panel.innerHTML="Завантаження...";
        return;
    }

    let rows=[...data2];
    let header=rows[0];
    let body=rows.slice(1);

    body.sort((a,b)=>{
        let A=a[sortColumn]||"", B=b[sortColumn]||"";
        if(!isNaN(A)&&!isNaN(B)) return sortAsc?A-B:B-A;
        return sortAsc?A.localeCompare(B):B.localeCompare(A);
    });

    panel.innerHTML=`
    <table>
        <tr>
            ${header.map((h,i)=>`<th onclick="sortBy(${i})">${h} ${sortColumn===i?(sortAsc?'↑':'↓'):''}</th>`).join("")}
        </tr>
        ${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}
    </table>`;
}

function sortBy(i){
    sortColumn===i ? sortAsc=!sortAsc : (sortColumn=i, sortAsc=true);
    renderSheet3();
}

/* drag panel */
let isDragging=false,startX=0,currentX=0,panelX=0;
const EDGE=25, panelWidth=window.innerWidth;

panel.style.transform=`translateX(${panelWidth}px)`;

document.addEventListener("pointerdown",e=>{
    if(k.contains(e.target)) return;

    const open=panel.classList.contains("show");

    if((!open && e.clientX < window.innerWidth-EDGE) && !panel.contains(e.target)) return;

    isDragging=true;
    startX=e.clientX;
    panel.style.transition="none";
});

document.addEventListener("pointermove",e=>{
    if(!isDragging) return;

    currentX=e.clientX;
    let dx=currentX-startX;
    const open=panel.classList.contains("show");

    if(!open){
        if(dx<0) return;
        panelX=panelWidth-dx;
    } else {
        panelX=-dx;
    }

    panelX=Math.max(0,Math.min(panelWidth,panelX));
    panel.style.transform=`translateX(${panelX}px)`;
});

document.addEventListener("pointerup",()=>{
    if(!isDragging) return;
    isDragging=false;

    panel.style.transition="0.25s";

    if(panelX < panelWidth/2){
        openPanel();
    } else {
        closePanel();
    }
});

function openPanel(){
    panel.classList.add("show");
    panel.style.transform="translateX(0)";
    hideKeyboard();
    renderSheet3();
}

function closePanel(){
    panel.classList.remove("show");
    panel.style.transform=`translateX(${panelWidth}px)`;
}

panel.addEventListener("click", hideKeyboard);

window.addEventListener("scroll", hideKeyboard);

</script>

</body>
</html>
